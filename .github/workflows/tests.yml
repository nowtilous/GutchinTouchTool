name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  model-tests:
    name: Model Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Run Model Tests
        run: |
          xcodebuild test \
            -scheme GutchinTouchTool \
            -destination 'platform=macOS' \
            -only-testing:GutchinTouchToolTests/ModelTests \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  serialization-tests:
